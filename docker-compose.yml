services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: hh_analytics
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    healthcheck:
      # Только кластер: так check проходит и при старом томе, где ещё нет hh_analytics
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # Одноразово создаёт БД, если том был от старой конфигурации без hh_analytics
  db-init:
    image: postgres:16-alpine
    environment:
      PGPASSWORD: postgres
    depends_on:
      postgres:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        set -e
        exists=$$(psql -h postgres -U postgres -d postgres -Atc "SELECT 1 FROM pg_database WHERE datname = 'hh_analytics'")
        if [ "$$exists" != "1" ]; then
          psql -h postgres -U postgres -d postgres -v ON_ERROR_STOP=1 -c "CREATE DATABASE hh_analytics"
        fi
    restart: "no"

  backend:
    build:
      context: ./backend
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@postgres:5432/hh_analytics
      TIMEZONE: Europe/Moscow
      ENABLE_SCHEDULER: "true"
      SYNC_INTERVAL_MINUTES: "60"
      HH_BASE_URL: https://api.hh.ru
      HH_AREA_ID: "1"
      HH_PERIOD_DAYS: "30"
      HH_PER_PAGE: "100"
      CBR_BASE_URL: https://www.cbr-xml-daily.ru
      REQUEST_TIMEOUT_SECONDS: "20"
      FRONTEND_ORIGIN: http://localhost:5173,http://127.0.0.1:5173
      HH_USER_AGENT: "OZPraktika-HHAnalytics/1.0 (docker-compose)"
    depends_on:
      postgres:
        condition: service_healthy
      db-init:
        condition: service_completed_successfully
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
    environment:
      VITE_API_BASE_URL: /api/v1
      API_PROXY_TARGET: http://backend:8000
    depends_on:
      - backend
    ports:
      - "5173:5173"

volumes:
  postgres_data:
