services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: hh_analytics
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d hh_analytics"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@postgres:5432/hh_analytics
      TIMEZONE: Europe/Moscow
      ENABLE_SCHEDULER: "true"
      SYNC_INTERVAL_MINUTES: "60"
      HH_BASE_URL: https://api.hh.ru
      HH_AREA_ID: "1"
      HH_PERIOD_DAYS: "30"
      HH_PER_PAGE: "100"
      CBR_BASE_URL: https://www.cbr-xml-daily.ru
      REQUEST_TIMEOUT_SECONDS: "20"
      FRONTEND_ORIGIN: http://localhost:5173
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
    environment:
      VITE_API_BASE_URL: http://localhost:8000/api/v1
    depends_on:
      - backend
    ports:
      - "5173:5173"

volumes:
  postgres_data:
