services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-hh_analytics}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      # Тот же пароль подставляется в backend через POSTGRES_* — не задавайте DATABASE_URL вручную, если хотите совпадение
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$$POSTGRES_USER\""]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_DB: ${POSTGRES_DB:-hh_analytics}
      TIMEZONE: Europe/Moscow
      ENABLE_SCHEDULER: "true"
      SYNC_INTERVAL_MINUTES: "60"
      HH_BASE_URL: https://api.hh.ru
      HH_AREA_ID: "1"
      HH_PERIOD_DAYS: "30"
      HH_PER_PAGE: "100"
      CBR_BASE_URL: https://www.cbr-xml-daily.ru
      REQUEST_TIMEOUT_SECONDS: "20"
      FRONTEND_ORIGIN: http://localhost:5173,http://127.0.0.1:5173
      HH_USER_AGENT: "OZPraktika-HHAnalytics/1.0 (docker-compose)"
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
    environment:
      VITE_API_BASE_URL: /api/v1
      API_PROXY_TARGET: http://backend:8000
    depends_on:
      - backend
    ports:
      - "5173:5173"

volumes:
  postgres_data:
